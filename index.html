        { q: "бһӮбһҺбһ“бһ¶бһ•бһӣбһӮбһ»бһҺбһҒбҹ’бһңбҹӮбһ„ $\\vec{i} \\times \\vec{j}$ бһ“бҹғбһңбҹүбһ·бһ…бһ‘бҹҗбһҡбһҜбһҖбһҸбһ¶бһӮбҹ„бһӣ?", opt: ["$\\vec{k}$", "$0$", "$1$", "$-\\vec{k}$"], ans: "$\\vec{k}$", exp: "бһҸбһ¶бһҳбһңбһ·бһ’бһ¶бһ“бһҠбҹғбһҹбҹ’бһҸбһ¶бҹҶ бһ“бһ·бһ„бһӣбһҖбҹ’бһҒбһҺбҹҲбһ•бһӣбһӮбһ»бһҺбһҒбҹ’бһңбҹӮбһ„бһҖбҹ’бһ“бһ»бһ„бһ”бҹ’бһҡбһ–бҹҗбһ“бҹ’бһ’бһҖбһјбһўбһҡбһҠбҹ„бһ“бҹҒбһҖбҹӮбһ„ бһӮбҹҒбһ”бһ¶бһ“ $\\vec{i} \\times \\vec{j} = \\vec{k}$бҹ”" },
        { q: "бһҸбһҫбһ•бһӣбһӮбһ»бһҺбһҒбҹ’бһңбҹӮбһ„бһ“бҹғбһ–бһёбһҡбһңбҹүбһ·бһ…бһ‘бҹҗбһҡ $\\vec{u} \\times \\vec{v}$ бһ•бҹ’бһҸбһӣбҹӢбһӣбһ‘бҹ’бһ’бһ•бһӣбһҮбһ¶бһўбҹ’бһңбһё?", opt: ["бһңбҹүбһ·бһ…бһ‘бҹҗбһҡ (Vector)", "бһ…бҹҶбһ“бһҪбһ“бһ–бһ·бһҸ (Scalar)", "бһҳбһ»бҹҶ (Angle)", "бһҳбҹүбһ¶бһ‘бҹ’бһҡбһёбһҹ (Matrix)"], ans: "бһңбҹүбһ·бһ…бһ‘бҹҗбһҡ (Vector)", exp: "бһ•бһӣбһӮбһ»бһҺбһҒбҹ’бһңбҹӮбһ„ (Cross product / Vector product) бһҸбҹӮбһ„бһҸбҹӮбһ•бҹ’бһҸбһӣбҹӢбһӣбһ‘бҹ’бһ’бһ•бһӣбһҮбһ¶бһңбҹүбһ·бһ…бһ‘бҹҗбһҡбһҗбҹ’бһҳбһёбһҳбһҪбһҷбһҠбҹӮбһӣбһҖбҹӮбһ„бһ‘бҹ…бһ“бһ№бһ„бһңбҹүбһ·бһ…бһ‘бҹҗбһҡбһҠбһҫбһҳбһ‘бһ¶бҹҶбһ„бһ–бһёбһҡбҹ”" },

        form.innerHTML += `
            <div class="question-box">
                <div class="question-title">бһҹбҹҶбһҺбһҪбһҡбһ‘бһё ${i+1}: ${item.q}</div>
                <div class="options">${optHtml}</div>
                <div id="r${i}" class="feedback"></div>
            </div>
        `;
    });

    function evaluateQuiz() {
        const name = document.getElementById('sName').value.trim();
        const sClass = document.getElementById('sClass').value.trim();

        if (!name || !sClass) {
            alert("бһҹбһјбһҳбһ”бҹҶбһ–бҹҒбһүбһҲбҹ’бһҳбҹ„бҹҮ бһ“бһ·бһ„бһҗбҹ’бһ“бһ¶бһҖбҹӢбһҡбҹҖбһ“бһҡбһ”бһҹбҹӢбһҹбһ·бһҹбҹ’бһҹбһҮбһ¶бһҳбһ»бһ“бһҹбһ·бһ“!");
            return;
        }

        let score = 0;
        shuffledQuestions.forEach((item, i) => {
            const selected = document.querySelector(`input[name="q${i}"]:checked`);
            const resBox = document.getElementById(`r${i}`);
            resBox.style.display = "block";

            if (selected && selected.value === item.ans) {
                score++;
                resBox.className = "feedback correct";
                resBox.innerHTML = "вң… <b>бһҸбҹ’бһҡбһ№бһҳбһҸбҹ’бһҡбһјбһң!</b> бһҠбҹҶбһҺбҹ„бҹҮбһҹбҹ’бһҡбһ¶бһҷбҹ– " + item.exp;
            } else {
                resBox.className = "feedback incorrect";
                resBox.innerHTML = "вқҢ <b>бһҳбһ·бһ“бһҸбҹ’бһҡбһ№бһҳбһҸбҹ’бһҡбһјбһңбһ‘бҹҒ!</b> бһ…бһҳбҹ’бһӣбһҫбһҷбһҠбҹӮбһӣбһҸбҹ’бһҡбһјбһңбһӮбһәбҹ– " + item.ans + "<br>рҹ’Ў <b>бһҖбһ¶бһҡбһ–бһ“бҹ’бһҷбһӣбҹӢбҹ–</b> " + item.exp;
            }
        });

        const summaryBox = document.getElementById('summary');
        summaryBox.style.display = "block";
        summaryBox.innerHTML = `рҹҺ“ бһ”бҹҒбһҖбҹ’бһҒбһҮбһ“бҹ– ${name} | бһҗбҹ’бһ“бһ¶бһҖбҹӢбҹ– ${sClass} <br> рҹ“Ҡ бһӣбһ‘бҹ’бһ’бһ•бһӣбһ‘бһ‘бһҪбһӣбһ”бһ¶бһ“бҹ– ${score} / ${shuffledQuestions.length} бһҹбҹҶбһҺбһҪбһҡ (бһ…бҹҶбһҺбһ¶бһҸбҹӢбһҗбҹ’бһ“бһ¶бһҖбҹӢбҹ– ${Math.round((score/25)*100)}%)`;
        
        if (window.MathJax) {
            MathJax.typesetPromise();
        }
        
        summaryBox.scrollIntoView({ behavior: 'smooth' });
    }
</script>
</body>
