<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <title>វិញ្ញាសាប្រឡងតេស្តសមត្ថភាព៖ ធរណីមាត្រក្នុងលំហ</title>
    
    <script>
        window.MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']]
            }
        };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js"></script>
    
    <style>
        :root { --primary: #2c3e50; --accent: #9b59b6; --success: #27ae60; }
        body { font-family: 'Khmer OS Battambang', sans-serif; background: #f4f7f6; padding: 20px; color: #333; line-height: 1.7; }
        .quiz-container { max-width: 850px; margin: auto; background: #fff; padding: 35px; border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.08); }
        h1 { text-align: center; color: var(--primary); margin-bottom: 30px; border-bottom: 3px solid var(--accent); padding-bottom: 15px; }
        .student-info { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 30px; background: #f5eef8; padding: 20px; border-radius: 8px; border-left: 5px solid var(--accent); }
        .student-info div { display: flex; flex-direction: column; }
        .student-info label { font-weight: bold; margin-bottom: 5px; color: var(--primary); }
        input[type="text"] { padding: 10px; border: 1px solid #ccc; border-radius: 5px; font-size: 1em; }
        .question-box { margin-bottom: 30px; padding: 20px; border: 1px solid #e1e8ed; background: #fff; border-radius: 8px; }
        .question-title { font-weight: bold; color: var(--primary); margin-bottom: 15px; font-size: 1.05em; }
        .options { display: flex; flex-direction: column; gap: 10px; margin-left: 10px; }
        .options label { cursor: pointer; display: flex; align-items: center; gap: 10px; padding: 5px; border-radius: 4px; }
        .options label:hover { background: #f5eef8; }
        .btn-submit { width: 100%; padding: 15px; background: var(--success); color: white; border: none; font-size: 1.2em; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .btn-submit:hover { background: #219150; }
        .feedback { margin-top: 15px; padding: 15px; display: none; border-radius: 6px; font-size: 0.95em; }
        .correct { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .incorrect { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        #summary { text-align: center; margin-top: 30px; font-weight: bold; font-size: 1.4em; color: var(--primary); padding: 20px; background: #e8f8f5; border-radius: 8px; display: none; }
    </style>
</head>
<body>

<div class="quiz-container">
    <h1>📝 វិញ្ញាសាតេស្ត៖ ធរណីមាត្រក្នុងលំហ (២៥ សំណួរថ្មី)</h1>
    
    <div class="student-info">
        <div>
            <label for="sName">ឈ្មោះសិស្ស៖</label>
            <input type="text" id="sName" placeholder="វាយបញ្ចូលឈ្មោះនៅទីនេះ...">
        </div>
        <div>
            <label for="sClass">ថ្នាក់រៀន៖</label>
            <input type="text" id="sClass" placeholder="ឧទាហរណ៍៖ ១២អា">
        </div>
    </div>

    <form id="quizForm"></form>
    
    <button type="button" class="btn-submit" onclick="evaluateQuiz()">បញ្ជូនវិញ្ញាសា និងពិនិត្យលទ្ធផល</button>
    <div id="summary"></div>
</div>

<script>
    // សំណួរថ្មីទាំង ២៥ អំពីធរណីមាត្រក្នុងលំហ
    const questions = [
        { q: "រកកូអរដោនេនៃវ៉ិចទ័រ $\\vec{AB}$ បើ $A(1, 2, 3)$ និង $B(4, 0, -1)$?", opt: ["$(3, -2, -4)$", "$(5, 2, 2)$", "$(-3, 2, 4)$", "$(3, 2, 4)$"], ans: "$(3, -2, -4)$", exp: "$\\vec{AB} = (x_b-x_a, y_b-y_a, z_b-z_a) = (4-1, 0-2, -1-3) = (3, -2, -4)$" },
        { q: "តើវ៉ិចទ័រណាជាវ៉ិចទ័រណរម៉ាល់នៃប្លង់ $(P): 2x - 3y + z - 5 = 0$?", opt: ["$\\vec{n}=(2, -3, 1)$", "$\\vec{n}=(2, 3, 1)$", "$\\vec{n}=(2, -3, -5)$", "$\\vec{n}=(-3, 1, -5)$"], ans: "$\\vec{n}=(2, -3, 1)$", exp: "វ៉ិចទ័រណរម៉ាល់ទាញចេញពីមេគុណរបស់ $x, y, z$ ក្នុងសមីការប្លង់ គឺ $\\vec{n}=(a, b, c) = (2, -3, 1)$។" },
        { q: "រកសមីការប្លង់ដែលកាត់តាមចំណុច $A(0,0,0)$ ហើយមានវ៉ិចទ័រណរម៉ាល់ $\\vec{n}=(1, 2, 3)$?", opt: ["$x + 2y + 3z = 0$", "$x + 2y + 3z = 6$", "$x - 2y + 3z = 0$", "$x + 2y - 3z = 0$"], ans: "$x + 2y + 3z = 0$", exp: "សមីការប្លង់៖ $1(x-0) + 2(y-0) + 3(z-0) = 0 \\Rightarrow x + 2y + 3z = 0$" },
        { q: "រកវ៉ិចទ័រប្រាប់ទិសនៃបន្ទាត់ $(L): \\begin{cases} x = 1 + 2t \\\\ y = 3 - t \\\\ z = 4t \\end{cases}$ ?", opt: ["$\\vec{u}=(2, -1, 4)$", "$\\vec{u}=(1, 3, 0)$", "$\\vec{u}=(2, 1, 4)$", "$\\vec{u}=(1, -1, 4)$"], ans: "$\\vec{u}=(2, -1, 4)$", exp: "វ៉ិចទ័រប្រាប់ទិសទាញចេញពីមេគុណនៃប៉ារ៉ាម៉ែត្រ $t$ គឺ $\\vec{u}=(2, -1, 4)$។" },
        { q: "គណនាចម្ងាយរវាងពីរចំណុច $A(1, 0, 2)$ និង $B(3, 4, 0)$?", opt: ["$\\sqrt{24}$", "$6$", "$4$", "$\\sqrt{12}$"], ans: "$\\sqrt{24}$", exp: "$AB = \\sqrt{(3-1)^2 + (4-0)^2 + (0-2)^2} = \\sqrt{4 + 16 + 4} = \\sqrt{24}$" },
        { q: "បើប្លង់ពីរមានវ៉ិចទ័រណរម៉ាល់ $\\vec{n}_1=(1, 2, -1)$ និង $\\vec{n}_2=(2, 4, -2)$ តើប្លង់ទាំងពីរមានទំនាក់ទំនងគ្នាបែបណា?", opt: ["ស្របគ្នា", "កែងគ្នា", "កាត់គ្នាបង្កើតមុំ $45^\\circ$", "ជាន់គ្នា"], ans: "ស្រbគ្នា", exp: "ដោយសារ $\\vec{n}_2 = 2\\vec{n}_1$ (វ៉ិចទ័រណរម៉ាល់ទាំងពីរស្របគ្នា) នាំឱ្យប្លង់ទាំងពីរស្របគ្នា។" },
        { q: "គណនាផលគុណខ្វែង $\\vec{i} \\times \\vec{j}$ នៃវ៉ិចទ័រឯកតាគោល?", opt: ["$\\vec{k}$", "$0$", "$1$", "$-\\vec{k}$"], ans: "$\\vec{k}$", exp: "តាមវិធានដៃស្តាំ និងលក្ខណៈផលគុណខ្វែងក្នុងប្រព័ន្ធកូអរដោនេកែង គេបាន $\\vec{i} \\times \\vec{j} = \\vec{k}$។" },
        { q: "តើផលគុណខ្វែងនៃពីរវ៉ិចទ័រ $\\vec{u} \\times \\vec{v}$ ផ្តល់លទ្ធផលជាអ្វី?", opt: ["វ៉ិចទ័រ (Vector)", "ចំនួនពិត (Scalar)", "មុំ (Angle)", "ម៉ាទ្រីស (Matrix)"], ans: "វ៉ិចទ័រ (Vector)", exp: "ផលគុណខ្វែង (Cross product / Vector product) តែងតែផ្តល់លទ្ធផលជាវ៉ិចទ័រថ្មីមួយដែលកែងទៅនឹងវ៉ិចទ័រដើមទាំងពីរ។" },
        { q: "រកកូអរដោនេចំណុចកណ្តាលនៃអង្កត់ $AB$ បើ $A(2, -4, 6)$ និង $B(0, 2, 2)$?", opt: ["$(1, -1, 4)$", "$(2, -2, 8)$", "$(1, -2, 4)$", "$(0, 0, 4)$"], ans: "$(1, -1, 4)$", exp: "$M = \\left( \\frac{2+0}{2}, \\frac{-4+2}{2}, \\frac{6+2}{2} \\right) = (1, -1, 4)$" },
        { q: "គណនាផ្ទៃក្រឡាត្រីកោណ $ABC$ បើដឹងថា $||\\vec{AB} \\times \\vec{AC}|| = 10$?", opt: ["$5$", "$10$", "$20$", "$2.5$"], ans: "$5$", exp: "ផ្ទៃក្រឡាត្រីកោណ $S = \\frac{1}{2}||\\vec{AB} \\times \\vec{AC}|| = \\frac{1}{2}(10) = 5$" },
        { q: "តើលក្ខណៈផលគុណខ្វែងមួយណាដែលត្រឹមត្រូវ?", opt: ["$\\vec{u} \\times \\vec{v} = -(\\vec{v} \\times \\vec{u})$", "$\\vec{u} \\times \\vec{v} = \\vec{v} \\times \\vec{u}$", "$\\vec{u} \\times \\vec{v} = 0$", "$\\vec{u} \\times \\vec{v} = 1$"], ans: "$\\vec{u} \\times \\vec{v} = -(\\vec{v} \\times \\vec{u})$", exp: "ផលគុណខ្វែងគ្មានលក្ខណៈត្រឡប់ទេ កាលណាដូរលំដាប់វ៉ិចទ័រ វានឹងដូរទិសដៅ (ផ្ទុយគ្នា)។" },
        { q: "រកតម្លៃ $d$ ដើម្បីឱ្យចំណុច $A(1, 2, -1)$ ស្ថិតនៅលើប្លង់ $3x - y + 2z + d = 0$?", opt: ["$1$", "$-1$", "$0$", "$2$"], ans: "$1$", exp: "យកកូអរដោនេ $A$ ជំនួសចូលសមីការប្លង់៖ $3(1) - 2 + 2(-1) + d = 0 \\Rightarrow 3 - 2 - 2 + d = 0 \\Rightarrow d = 1$" },
        { q: "បើបន្ទាត់មួយមានវ៉ិចទ័រប្រាប់ទិស $\\vec{u}=(1, 2, 3)$ ហើយប្លង់មួយមានវ៉ិចទ័រណរម៉ាល់ $\\vec{n}=(2, -1, 0)$ តើបន្ទាត់ និងប្លង់នោះមានទំនាក់ទំនងគ្នាយ៉ាងណា?", opt: ["បន្ទាត់ស្របនឹងប្លង់", "បន្ទាត់កែងនឹងប្លង់", "បន្ទាត់ស្ថិតក្នុងប្លង់", "កាត់គ្នាបង្កើតមុំ $60^\\circ$"], ans: "បន្ទាត់ស្របនឹងប្លង់", exp: "គណនា $\\vec{u} \\cdot \\vec{n} = (1)(2) + (2)(-1) + (3)(0) = 0$។ ដោយសារ $\\vec{u} \\perp \\vec{n}$ នាំឱ្យបន្ទាត់នោះស្របនឹងប្លង់។" },
        { q: "គណនាម៉ូឌុលនៃវ៉ិចទ័រ $\\vec{u} = (-2, 1, 2)$?", opt: ["$3$", "$9$", "$\\sqrt{5}$", "$5$"], ans: "$3$", exp: "$||\\vec{u}|| = \\sqrt{(-2)^2 + 1^2 + 2^2} = \\sqrt{4 + 1 + 4} = \\sqrt{9} = 3$" },
        { q: "រកសមីការដែនស៊្វែរដែលមានផ្ចិត $I(0,0,0)$ និងកាំ $R=5$?", opt: ["$x^2 + y^2 + z^2 = 25$", "$x^2 + y^2 + z^2 = 5$", "$x^2 + y^2 + z^2 = 10$", "$x + y + z = 5$"], ans: "$x^2 + y^2 + z^2 = 25$", exp: "សមីការដែនស៊្វែរផ្ចិតគល់កូអរដោនេ៖ $x^2 + y^2 + z^2 = R^2 = 5^2 = 25$" },
        { q: "តើផលគុណចម្រុះ $(\\vec{u} \\times \\vec{v}) \\cdot \\vec{w}$ ប្រើសម្រាប់គណនាអ្វីក្នុងធរណីមាត្រ?", opt: ["មាឌប្រលេពីប៉ែតឈរ", "ផ្ទៃក្រឡាប្រឡេឡូក្រាម", "ចម្ងាយរវាងពីរចំណុច", "មុំរវាងពីរវ៉ិចទ័រ"], ans: "មាឌប្រលេពីប៉ែតឈរ", exp: "តម្លៃដាច់ខាតនៃផលគុណចម្រុះ $|(\\vec{u} \\times \\vec{v}) \\cdot \\vec{w}|$ គឺស្មើនឹងមាឌរបស់ប្រលេពីប៉ែតដែលសង់លើវ៉ិចទ័រទាំងបី។" },
        { q: "បើវ៉ិចទ័រពីរ $\\vec{u}$ និង $\\vec{v}$ ស្របគ្នា តើផលគុណខ្វែង $\\vec{u} \\times \\vec{v}$ ស្មើនឹងអ្វី?", opt: ["$\\vec{0}$", "$1$", "$\\vec{u} \\cdot \\vec{v}$", "$0$"], ans: "$\\vec{0}$", exp: "វ៉ិចទ័រស្របគ្នានាំឱ្យមុំ $\\theta = 0^\\circ$ ឬ $180^\\circ$ ដែលធ្វើឱ្យ $\\sin\\theta = 0$ ដូចនេះផលគុណខ្វែងស្មើវ៉ិចទ័រសូន្យ។" },
        { q: "រកកូអរដោនេទីប្រជុំទម្ងន់ $G$ នៃត្រីកោណ $ABC$ បើ $A(1,2,3), B(2,3,4), C(3,4,2)$?", opt: ["$(2, 3, 3)$", "$(3, 3, 3)$", "$(2, 2, 2)$", "$(6, 9, 9)$"], ans: "$(2, 3, 3)$", exp: "$G = \\left( \\frac{1+2+3}{3}, \\frac{2+3+4}{3}, \\frac{3+4+2}{3} \\right) = (2, 3, 3)$" },
        { q: "រកសមីការស៊ីមេទ្រីនៃបន្ទាត់ដែលកាត់តាម $A(1, 2, 3)$ មានវ៉ិចទ័រប្រាប់ទិស $\\vec{u}=(4, 5, 6)$?", opt: ["$\\frac{x-1}{4} = \\frac{y-2}{5} = \\frac{z-3}{6}$", "$\\frac{x+1}{4} = \\frac{y+2}{5} = \\frac{z+3}{6}$", "$\\frac{x-4}{1} = \\frac{y-5}{2} = \\frac{z-6}{3}$", "$4x = 5y = 6z$"], ans: "$\\frac{x-1}{4} = \\frac{y-2}{5} = \\frac{z-3}{6}$", exp: "រូបមន្តសមីការស៊ីមេទ្រី៖ $\\frac{x-x_0}{a} = \\frac{y-y_0}{b} = \\frac{z-z_0}{c}$" },
        { q: "គណនាផលគុណស្កាលែ $\\vec{u} \\cdot \\vec{v}$ បើ $\\vec{u}=(1, 2, 3)$ និង $\\vec{v}=(2, -1, 0)$?", opt: ["$0$", "$4$", "$1$", "$-1$"], ans: "$0$", exp: "$\\vec{u} \\cdot \\vec{v} = (1)(2) + (2)(-1) + (3)(0) = 2 - 2 + 0 = 0$" },
        { q: "រកផ្ចិត និងកាំនៃដែនស៊្វែរ $(S): (x-1)^2 + y^2 + (z+2)^2 = 9$?", opt: ["ផ្ចិត $I(1, 0, -2)$, កាំ $R=3$", "ផ្ចិត $I(-1, 0, 2)$, កាំ $R=9$", "ផ្ចិត $I(1, 0, 2)$, កាំ $R=3$", "ផ្ចិត $I(1, 1, -2)$, កាំ $R=3$"], ans: "ផ្ចិត $I(1, 0, -2)$, កាំ $R=3$", exp: "តាមទម្រង់ស្តង់ដារផ្ចិតគឺ $(x_0, y_0, z_0)=(1, 0, -2)$ ហើកាំ $R=\\sqrt{9}=3$។" },
        { q: "តើប្លង់កូអរដោនេ $(Oxy)$ មានសមីការដូចម្តេច?", opt: ["$z = 0$", "$x = 0$", "$y = 0$", "$x + y = 0$"], ans: "$z = 0$", exp: "នៅលើប្លង់ $(Oxy)$ រាល់ចំណុចទាំងអស់មានកូអរដោនេតាមអ័ក្ស $z$ ស្មើនឹង $0$ ជានិច្ច។" },
        { q: "បើវ៉ិចទ័រ $\\vec{u}$ កែងនឹងវ៉ិចទ័រ $\\vec{v}$ តើផលគុណខ្វែងរបស់វាមានម៉ូឌុលស្មើនឹងអ្វី?", opt: ["$||\\vec{u}|| \\cdot ||\\vec{v}||$", "$0$", "$1$", "$\\vec{u} \\cdot \\vec{v}$"], ans: "$||\\vec{u}|| \\cdot ||\\vec{v}||$", exp: "កែងគ្នានាំឱ្យ $\\theta = 90^\\circ \\Rightarrow \\sin(90^\\circ) = 1$ ដូចនេះ $||\\vec{u} \\times \\vec{v}|| = ||\\vec{u}|| \\cdot ||\\vec{v}||$" },
        { q: "រកចម្ងាយពីចំណុច $A(0, 0, 0)$ ទៅប្លង់ $(P): 3x - 4y + 10 = 0$?", opt: ["$2$", "$10$", "$5$", "$\\frac{10}{7}$"], ans: "$2$", exp: "$d = \\frac{|3(0) - 4(0) + 10|}{\\sqrt{3^2 + (-4)^2 + 0^2}} = \\frac{10}{\\sqrt{25}} = \\frac{10}{5} = 2$" },
        { q: "បើ $\\vec{u}$ ជាវ៉ិចទ័រមិនសូន្យ តើផលគុណខ្វែង $\\vec{u} \\times \\vec{u}$ ស្មើនឹងអ្វី?", opt: ["$\\vec{0}$", "$||\\vec{u}||^2$", "$1$", "$2\\vec{u}$"], ans: "$\\vec{0}$", exp: "វ៉ិចទ័រមួយស្របនឹងខ្លួនឯងជានិច្ច (មុំ $0^\\circ$) នាំឱ្យផលគុណខ្វែងស្មើវ៉ិចទ័រសូន្យ។" }
    ];

    // មុខងារសម្រាប់ Shuffle Array (Algorithm: Fisher-Yates)
    function shuffle(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
        return array;
    }

    // ១. ធ្វើការ Shuffle លំដាប់លំហាត់
    const shuffledQuestions = shuffle([...questions]);

    const form = document.getElementById('quizForm');
    shuffledQuestions.forEach((item, i) => {
        // ២. ធ្វើការ Shuffle លំដាប់ជម្រើសចម្លើយនៅក្នុងសំណួរនីមួយៗ
        let shuffledOptions = shuffle([...item.opt]);

        let optHtml = shuffledOptions.map(o => `
            <label>
                <input type="radio" name="q${i}" value="${o}"> ${o}
            </label>
        `).join('');
        
        form.innerHTML += `
            <div class="question-box">
                <div class="question-title">សំណួរទី ${i+1}: ${item.q}</div>
                <div class="options">${optHtml}</div>
                <div id="r${i}" class="feedback"></div>
            </div>
        `;
    });

    // មុខងារកែពិន្ទុ និងបង្ហាញដំណោះស្រាយ
    function evaluateQuiz() {
        const name = document.getElementById('sName').value.trim();
        const sClass = document.getElementById('sClass').value.trim();

        if (!name || !sClass) {
            alert("សូមបំពេញឈ្មោះ និងថ្នាក់រៀនរបស់សិស្សជាមុនសិន!");
            return;
        }

        let score = 0;
        shuffledQuestions.forEach((item, i) => {
            const selected = document.querySelector(`input[name="q${i}"]:checked`);
            const resBox = document.getElementById(`r${i}`);
            resBox.style.display = "block";

            if (selected && selected.value === item.ans) {
                score++;
                resBox.className = "feedback correct";
                resBox.innerHTML = "✅ <b>ត្រឹមត្រូវ!</b> ដំណោះស្រាយ៖ " + item.exp;
            } else {
                resBox.className = "feedback incorrect";
                resBox.innerHTML = "❌ <b>មិនត្រឹមត្រូវទេ!</b> ចម្លើយដែលត្រូវគឺ៖ " + item.ans + "<br>💡 <b>ការពន្យល់៖</b> " + item.exp;
            }
        });

        const summaryBox = document.getElementById('summary');
        summaryBox.style.display = "block";
        summaryBox.innerHTML = `🎓 បេក្ខជន៖ ${name} | ថ្នាក់៖ ${sClass} <br> 📊 លទ្ធផលទទួលបាន៖ ${score} / ${shuffledQuestions.length} សំណួរ (ចំណាត់ថ្នាក់៖ ${Math.round((score/25)*100)}%)`;
        
        if (window.MathJax) {
            MathJax.typesetPromise();
        }
        
        summaryBox.scrollIntoView({ behavior: 'smooth' });
    }
</script>
